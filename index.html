<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presence</title>
   <style>
    body {
        /* This is the secret "System Font" stack */
        font-family: Helvetica;
        background-color: #ffffff;
        color: #ff0000;
        padding: 60px 40px; /* More whitespace like his site */
        max-width: 650px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased; /* Makes fonts look sharper */
    }

    h1 {
        font-size: 10px; /* He uses a small, subtle header */
        font-weight: 500;
        margin-bottom: 40px;
        letter-spacing: -0.01em;
    }

    ol {
        list-style-type: decimal-leading-zero;
        padding-left: 0; /* Align numbers to the left margin */
        list-style-position: inside; 
        color: #999; /* Grey numbers */
    }

    li {
        margin-bottom: 12px;
        font-size: 16px;
    }

    /* This part makes the text black while keeping the numbers grey */
    li a {
        color: #000;
        text-decoration: none;
        margin-left: 10px;
        border-bottom: 1px solid #eee;
    }

    li a:hover {
        border-bottom: 1px solid #000;
    }

    /* If you want that serif "Blog" look for certain text, use this class */
    .serif {
        font-family: Helvetica;
        font-style: italic;
    }
</style>
</head>
<body>

    <h1>presence.</h1>

    <ol>
        <li><a href="#">blog: photographs and essays</a></li>
        <li><a href="#">@yourname on twitter</a></li>
        <li><a href="#">@yourname on instagram</a></li>
        <li><a href="#">email me</a></li>
    </ol>

</body>
</html>
